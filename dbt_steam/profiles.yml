steam_trino:
  target: dev
  outputs:
    dev:
      type: trino
      method: ldap
      host: "{{ env_var('TRINO_HOST', 'trino') }}"
      port: "{{ env_var('TRINO_PORT', '8443') | int }}"
      user: "{{ env_var('TRINO_USER', 'ilya') }}"
      password: "{{ env_var('TRINO_PASSWORD') }}"
      catalog: hive
      schema: raw
      threads: 4
      retries: "{{ env_var('TRINO_MAX_ATTEMPTS', '2') | int }}"
      http_scheme: "{{ env_var('TRINO_HTTP_SCHEME', 'https') }}"
      session_properties:
        query_max_run_time: "{{ env_var('TRINO_QUERY_MAX_RUN_TIME', '10m') }}"
      verify: false
