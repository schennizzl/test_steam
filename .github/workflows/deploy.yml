name: Deploy To Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Setup SSH key
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add server host key
        shell: bash
        run: |
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Run remote deploy
        shell: bash
        run: |
          ssh -p "${{ secrets.DEPLOY_PORT }}" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "set -euo pipefail; \
             REPO='${{ secrets.DEPLOY_PATH }}'; \
             if [ -x \"\$REPO/scripts/deploy.sh\" ]; then \
               bash \"\$REPO/scripts/deploy.sh\" \"\$REPO\" main; \
             else \
               cd \"\$REPO\"; \
               git fetch origin main; \
               git checkout main; \
               git pull --ff-only origin main; \
               docker compose up -d --build --remove-orphans; \
             fi"
